# Domain A: Inorganic superconductors (UCI Superconductivty Data, id 464)
domain: superconductor
data:
  # pool_subsample: cap the searchable pool for CPU-friendly wall-clock.
  # Full dataset is 21,263 rows; we subsample the pool (documented in RESULTS.md).
  pool_subsample: 3000
  test_frac: 0.15          # held-out set, used for CALIBRATION ONLY
  split: random            # inorganic compositions -> no molecular scaffold
model:
  type: mlp
  hidden: [256, 256, 128]
  input_dim: 81
  ensemble_size: 5
  epochs: 120
  patience: 12
  lr: 0.001
  weight_decay: 0.00001
  batch_size: 256
  logvar_min: -8.0
  logvar_max: 6.0
active_learning:
  seed_frac: 0.05          # initial labeled seed (of the pool)
  batch_frac: 0.01         # acquired per round (of the pool)
  n_rounds: 12
  topk_frac: 0.05          # "hit" = top 5% of the pool by true Tc
  ucb_beta: 1.5
smoke:
  pool_subsample: 800
  ensemble_size: 2
  epochs: 20
  patience: 5
  n_rounds: 5
  seeds: 2
